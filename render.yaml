services:
  - type: web
    name: mess-waste-backend
    plan: free
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mess-waste-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: mess-waste-db
    databaseName: mess_waste
    plan: free
